<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aspen Spas — Service Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f3ef;--cd:#fff;--c2:#faf8f5;--bd:#e8e2d9;--am:#c67a2e;--gn:#2d8a4e;--rd:#c0392b;--bl:#2c6fbb;--pr:#7c3aed;--cy:#0e7490;--tx:#2c2418;--mu:#7a7060;--dm:#a09888;--ft:'DM Sans',sans-serif;--mn:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--tx);font-family:var(--ft);font-size:23px}::selection{background:var(--am);color:#fff}
.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:100}
.hdr img{height:36px}.hs{font-size:12.5px;color:var(--dm)}
.nv{display:flex;gap:3px;flex-wrap:wrap}.nv button{padding:7px 15px;border-radius:7px;border:1px solid transparent;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--ft);background:transparent;color:var(--mu);transition:all .15s}.nv button:hover{background:var(--c2)}.nv button.on{background:var(--am);color:#fff;border-color:var(--am)}.nv button.ac{border-color:var(--am);color:var(--am)}
.wr{padding:0;max-width:100%;margin:0}
.fl{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
select,input[type=text],input[type=number],input[type=date]{background:#fff;border:1px solid var(--bd);border-radius:7px;padding:8px 12px;color:var(--tx);font-size:15px;font-family:var(--ft);outline:none}select:focus,input:focus{border-color:var(--am)}select{cursor:pointer;min-width:130px}input[type=text]{flex:1;min-width:140px}
.ct{font-size:10.5px;color:var(--dm)}
.g6{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}
.gT{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
.st{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .15s}.st:hover,.st.sel{border-color:var(--am);box-shadow:0 2px 12px rgba(198,122,46,.08)}
.st-l{font-size:11.5px;color:var(--mu);font-weight:600;letter-spacing:.06em;text-transform:uppercase}.st-v{font-size:30px;font-weight:700;font-family:var(--mn);margin-top:1px}.st-s{font-size:11.5px;color:var(--dm);margin-top:1px}
.dp{background:#fff;border:1.5px solid var(--am);border-radius:10px;padding:14px;margin-top:8px;margin-bottom:12px;animation:sd .2s}@keyframes sd{from{opacity:0;transform:translateY(-6px)}to{opacity:1}}
.dp-x{float:right;background:none;border:none;color:var(--dm);cursor:pointer;font-size:17px}.dp-t{font-size:16px;font-weight:700;margin-bottom:8px}
.dp-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:6px}.dp-i{background:var(--c2);border-radius:7px;padding:8px;display:flex;justify-content:space-between;align-items:center}.dp-clickable:hover{background:var(--bd);transform:scale(1.03);transition:all .12s;box-shadow:0 2px 8px rgba(198,122,46,.15)}.dp-il{font-size:12.5px;color:var(--mu)}.dp-iv{font-size:17px;font-weight:700;font-family:var(--mn)}
.cd{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}.cd-t{font-size:18.5px;font-weight:700;margin-bottom:8px}
.tt{display:flex;gap:2px}.tt button{padding:3px 10px;border-radius:5px;border:1px solid var(--bd);background:#fff;color:var(--mu);font-size:10.5px;font-weight:600;cursor:pointer;font-family:var(--ft)}.tt button.on{background:var(--am);color:#fff;border-color:var(--am)}
/* Chart */
.ca{position:relative;height:180px;display:flex;align-items:flex-end;gap:3px;padding:20px 4px 24px}.cc2{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}.cbw{width:100%;max-width:36px;display:flex;flex-direction:column-reverse;border-radius:5px 5px 0 0;overflow:hidden}.csg{transition:height .6s cubic-bezier(.34,1.56,.64,1)}.clb{font-size:8px;color:var(--dm);margin-top:3px}.cvl{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;font-family:var(--mn);white-space:nowrap}
.cgl{position:absolute;bottom:0;width:100%;height:30%;background:linear-gradient(to top,rgba(198,122,46,.04),transparent);border-radius:5px 5px 0 0}
.lg{display:flex;gap:10px;justify-content:center;margin-top:4px}.lg span{font-size:9px;color:var(--dm);display:flex;align-items:center;gap:3px}.ld{width:7px;height:7px;border-radius:50%}
/* Mini donut */
.donut-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:6px 0}
.donut-box{text-align:center}.donut-lbl{font-size:9px;color:var(--dm);margin-top:2px}
/* Repair */
.rp-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}.rp-i{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .15s;border-left:3px solid var(--am)}.rp-i:hover{border-color:var(--am);box-shadow:0 2px 8px rgba(198,122,46,.06)}.rp-i.sel{border-color:var(--am);background:#fef8f4}
.rp-h{display:flex;justify-content:space-between;align-items:center}.rp-n{font-size:15px;font-weight:600}.rp-c{font-size:23px;font-weight:700;font-family:var(--mn);color:var(--am)}
.rp-d{font-size:8px;color:var(--dm);margin-top:2px}
.rp-det{background:#fff;border:1.5px solid var(--am);border-radius:12px;padding:16px;margin-bottom:12px;animation:sd .2s}
/* Tech */
.tc{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s}.tc:hover{border-color:var(--am);box-shadow:0 3px 14px rgba(198,122,46,.06);transform:translateY(-1px)}
.tc-h{display:flex;align-items:center;gap:9px;margin-bottom:10px}.tc-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-family:var(--mn)}
.tc-n{font-size:18.5px;font-weight:700}.tc-j{font-size:9px;color:var(--dm)}.tc-r{margin-left:auto;text-align:right}.tc-rv{font-size:18.5px;font-weight:700;font-family:var(--mn)}.tc-rl{font-size:8px;color:var(--dm)}
.bb{width:100%;height:4px;background:var(--bd);border-radius:3px;overflow:hidden}.bf{height:100%;border-radius:3px;transition:width .5s}
.tc-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:9px}.tc-m{border-radius:7px;padding:7px 9px;background:var(--c2)}.tc-mv{font-size:20.5px;font-weight:700;font-family:var(--mn)}.tc-ml{font-size:10.5px;color:var(--mu);text-transform:uppercase}
.tc-a{margin-top:7px;display:flex;justify-content:space-between;padding-top:7px;border-top:1px solid var(--bd);font-size:10.5px}
/* Tech Modal */
.tmb{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:1000;padding:12px}
.tm{background:#fff;border-radius:16px;max-width:880px;width:100%;max-height:88vh;display:flex;flex-direction:column;animation:sd .2s}.tmh{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd);flex-shrink:0}.tmx{margin-left:auto;background:none;border:none;color:var(--dm);cursor:pointer;font-size:20.5px}.tmd{padding:14px 18px;overflow-y:auto;flex:1}
.tms{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-bottom:12px}.tmi{background:var(--c2);border-radius:7px;padding:8px;text-align:center}.tmiv{font-size:20.5px;font-weight:700;font-family:var(--mn)}.tmil{font-size:10.5px;color:var(--mu);text-transform:uppercase}
.tmsec{font-size:12.5px;font-weight:700;margin:12px 0 5px}.sr{display:flex;align-items:center;gap:6px;margin-bottom:3px}.sn{width:70px;font-size:10.5px;color:var(--mu);flex-shrink:0}.sc{width:22px;text-align:right;font-size:10.5px;font-weight:600;font-family:var(--mn)}.sa{width:70px;text-align:right;font-size:10.5px;color:var(--dm);font-family:var(--mn)}
/* Table */
table{width:100%;border-collapse:collapse;font-size:14px}th{padding:10px 8px;text-align:left;color:var(--mu);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--bd);white-space:nowrap;background:#fff;position:sticky;top:0;z-index:1}td{padding:9px 8px;border-bottom:1px solid var(--bd)}tr:hover td{background:var(--c2)}
.badge{padding:3px 9px;border-radius:14px;font-size:11.5px;font-weight:600;white-space:nowrap}.bw{background:#fde8e8;color:var(--rd)}.bnw{background:#e6f4eb;color:var(--gn)}.bo{background:#e8f0fb;color:var(--bl)}.bpf{background:#fef3e2;color:var(--am)}.bcm{background:#f3e8fe;color:var(--pr)}
td.ed{cursor:pointer;position:relative}td.ed:hover{background:rgba(198,122,46,.05)!important}td.ed:hover .ei{opacity:.6}td.eg{padding:1px 2px}td.eg input,td.eg select{background:#fff;border:1.5px solid var(--am);border-radius:4px;padding:4px 5px;color:var(--tx);font-size:11.5px;font-family:var(--ft);outline:none;width:100%}
.ei{font-size:7px;color:var(--am);opacity:0;margin-left:2px;vertical-align:super}.del{background:none;border:none;color:var(--dm);cursor:pointer;font-size:12.5px}.del:hover{color:var(--rd)}.ox{overflow-x:auto}.mono{font-family:var(--mn)}.ell{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:3px 8px;border-radius:8px;font-size:10.5px;font-weight:600;background:#fef3e2;color:var(--am);border:1px solid #f0dcc4;white-space:nowrap}
.tw{display:flex;flex-wrap:wrap;gap:2px}
.tag-opt{padding:3px 8px;border-radius:8px;font-size:10.5px;font-weight:500;background:var(--c2);color:var(--mu);border:1px solid var(--bd);cursor:pointer;transition:all .12s;user-select:none}.tag-opt:hover{border-color:var(--am);color:var(--am)}.tag-opt.on{background:var(--am);color:#fff;border-color:var(--am)}
/* Customer */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:7px}.cc{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}.cc:hover,.cc.sel{border-color:var(--am);box-shadow:0 2px 8px rgba(198,122,46,.06)}.cc-n{font-size:15px;font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cc-s{font-size:11.5px;color:var(--dm)}.cc-v{font-size:20.5px;font-weight:700;font-family:var(--mn);color:var(--am)}
/* Warranty */
.wc{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}
.wi{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px;transition:all .15s}.wi:hover{border-color:var(--am)}
.wi-cat{font-size:14px;font-weight:700;margin-bottom:4px}.wi-yrs{font-size:23px;font-weight:700;font-family:var(--mn);color:var(--am)}.wi-note{font-size:9px;color:var(--dm);margin-top:2px}
.wi-bar{height:6px;background:var(--bd);border-radius:3px;margin-top:6px;overflow:hidden}.wi-bf{height:100%;border-radius:3px}
.w-status{display:inline-block;padding:1px 6px;border-radius:10px;font-size:8px;font-weight:600}
.w-ok{background:#e6f4eb;color:var(--gn)}.w-exp{background:#fde8e8;color:var(--rd)}.w-warn{background:#fef3e2;color:var(--am)}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:1000;padding:14px}
.mdl{background:#fff;border-radius:16px;padding:22px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}.mdl h2{font-size:17px;font-weight:700;margin-bottom:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.fg .f2{grid-column:1/3}.fg label{display:block;font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;font-weight:600}.fg input,.fg select{width:100%}
.ma{display:flex;gap:5px;margin-top:14px;justify-content:flex-end}.bc{padding:6px 16px;border-radius:7px;border:1px solid var(--bd);background:#fff;color:var(--mu);cursor:pointer;font-size:11.5px;font-family:var(--ft)}.bs{padding:6px 20px;border-radius:7px;border:none;background:var(--am);color:#fff;cursor:pointer;font-size:11.5px;font-weight:700;font-family:var(--ft)}.bs:hover{background:#b36a22}
@media(max-width:640px){.wr{padding:10px}.fg{grid-template-columns:1fr}.fg .f2{grid-column:1}.g6{grid-template-columns:repeat(2,1fr)}}

/* ── Price List ── */
.pl-tbl{width:100%;border-collapse:collapse;font-size:14px}
.pl-tbl th{padding:9px 8px;text-align:left;color:var(--mu);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--bd);white-space:nowrap;background:#fff;position:sticky;top:0;z-index:1}
.pl-tbl td{padding:8px;border-bottom:1px solid var(--bd)}
.pl-tbl tr:hover td{background:var(--c2);cursor:pointer}
.pl-exp{background:var(--c2);animation:sd .15s}
.pl-exp td{padding:12px 16px}
/* ── Warranty Calc ── */
.wc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.wc-res{border-radius:10px;padding:16px;border:1.5px solid}
.wc-res.ok{background:#e6f4eb;border-color:var(--gn)}
.wc-res.exp{background:#fde8e8;border-color:var(--rd)}
.wc-res.part{background:#fef3e2;border-color:var(--am)}
.wc-tier{font-size:20.5px;font-weight:700;margin-bottom:4px}
.wc-detail{font-size:14px;color:var(--mu)}
.wc-ref th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mu);font-weight:400;padding:6px 8px;border-bottom:1px solid var(--bd);background:var(--c2)}
.wc-ref td{padding:7px 8px;border-bottom:1px solid var(--bd);font-size:12.5px}
.yr-free{background:#e6f4eb;color:var(--gn);padding:2px 7px;border-radius:8px;font-size:11.5px;font-weight:600}
.yr-part{background:#fef3e2;color:var(--am);padding:2px 7px;border-radius:8px;font-size:11.5px;font-weight:600}
.yr-out{background:#fde8e8;color:var(--rd);padding:2px 7px;border-radius:8px;font-size:11.5px;font-weight:600}
/* ── Ticket / AI Invoice ── */
.tk-shell{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 120px);gap:0}
.tk-left{background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 120px);position:sticky;top:0}
.tk-right{padding:18px;overflow-y:auto;background:var(--bg)}
.tk-pane{padding:14px 16px;border-bottom:1px solid var(--bd)}
.tk-pane-t{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cy);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.tk-story{width:100%;height:100px;min-height:70px;max-height:160px;padding:10px 12px;border:1px solid var(--bd);border-radius:10px;font-family:var(--ft);font-size:15px;resize:vertical;outline:none;line-height:1.55;transition:border .2s}
.tk-story:focus{border-color:var(--am)}
.ai-gen-btn{width:100%;margin-top:8px;padding:11px;background:linear-gradient(135deg,#7c3aed,#4a2d8a);color:#fff;border:none;border-radius:10px;font-family:var(--ft);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.ai-gen-btn:hover{background:linear-gradient(135deg,#5a3a9a,#3a2070)}
.ai-gen-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-stat{font-size:12.5px;color:#7c3aed;margin-top:6px;min-height:16px;text-align:center}
.tk-prod-list{display:flex;flex-direction:column;gap:3px;max-height:220px;overflow-y:auto}
.tk-prod-item{display:flex;align-items:center;padding:7px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;gap:6px}
.tk-prod-item:hover{background:var(--c2);border-color:var(--bd)}
.tk-prod-name{font-size:12.5px;font-weight:500;flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tk-prod-price{font-size:12.5px;font-weight:600;color:var(--am);white-space:nowrap}
.tk-add-btn{width:18px;height:18px;background:var(--am);color:#fff;border:none;border-radius:50%;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Invoice card inside ticket tab */
.inv-card2{background:#fff;border-radius:14px;box-shadow:0 2px 24px rgba(0,0,0,.08);overflow:hidden;max-width:860px;margin:0 auto}
.inv-head2{background:linear-gradient(135deg,#2c2418 0%,#1a1208 100%);color:#fff;padding:24px 30px;display:flex;justify-content:space-between;align-items:flex-start}
.inv-body2{padding:24px 30px}
.lrow2{border-bottom:1px solid var(--bd)}
.lrow2:hover{background:#fafbfd}
.lrow2 td{padding:7px 10px;vertical-align:middle;font-size:14px}
.ldesc2{width:100%;border:none;background:transparent;font-family:var(--ft);font-size:14px;font-weight:500;color:var(--tx);outline:none}
.lqty2,.lprice2{padding:4px 6px;border:1px solid var(--bd);border-radius:6px;font-family:var(--ft);font-size:12.5px;text-align:right;outline:none}
.lqty2{width:50px;text-align:center}
.lprice2{width:80px}
.lqty2:focus,.lprice2:focus{border-color:var(--am)}
.lsub2{font-size:14px;font-weight:600;text-align:right;font-family:var(--mn)}
.ldel2{background:none;border:none;cursor:pointer;color:#ddd;font-size:15px;padding:3px 6px;border-radius:5px}
.ldel2:hover{color:var(--rd);background:#fdf0ee}
.tot-box2{min-width:260px;border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.tot-row2{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;font-size:15px;border-bottom:1px solid var(--bd)}
.tot-row2:last-child{border:none}
.tot-grand{background:var(--tx);color:#fff;font-weight:700;font-size:16px}
.tot-grand .tot-lbl2{color:rgba(255,255,255,.6)}
.tot-lbl2{color:var(--mu)}
.tk-new-ai{animation:aihl 1.5s ease-out forwards}
@keyframes aihl{from{background:#f0ebff}to{background:transparent}}
/* Language toggle */
.lang-btn{border:1px solid var(--bd);background:#fff;color:var(--mu);border-radius:7px;padding:5px 12px;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.lang-btn:hover{background:var(--am);color:#fff;border-color:var(--am)}

// SVG Area Chart with smooth curves
function buildAreaChart(arr){
  if(arr.length===0)return"<div style='text-align:center;color:var(--dm);padding:20px'>Sin datos</div>";
  let mx=Math.max(...arr.map(b=>b.w+b.n+b.o),1);
  let W=560,H=180,pad=30,chartW=W-pad*2,chartH=H-50;
  let step=arr.length>1?chartW/(arr.length-1):chartW;

  // Build cumulative points for stacked area
  function pts(accessor){return arr.map((b,i)=>[pad+i*step, H-25-accessor(b)/mx*chartH]);}

  let ptsW=arr.map((b,i)=>[pad+i*step, H-25-(b.w)/mx*chartH]);
  let ptsWN=arr.map((b,i)=>[pad+i*step, H-25-(b.w+b.n)/mx*chartH]);
  let ptsAll=arr.map((b,i)=>[pad+i*step, H-25-(b.w+b.n+b.o)/mx*chartH]);
  let baseline=arr.map((b,i)=>[pad+i*step, H-25]);

  function toPath(pts){return pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(" ");}
  function toArea(top,bot){return toPath(top)+" "+toPath([...bot].reverse()).replace("M","L")+" Z";}

  // Grid lines
  let gridLines="";
  for(let i=0;i<=4;i++){let y=H-25-i/4*chartH;gridLines+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--bd)" stroke-width="0.5" stroke-dasharray="3,3"/><text x="${pad-4}" y="${y+3}" text-anchor="end" font-size="7" fill="var(--dm)">${Math.round(mx*i/4)}</text>`;}

  // Labels
  let labels=arr.map((b,i)=>{let x=pad+i*step;let lbl=b.k.length>7?b.k.substring(5):b.k;return`<text x="${x}" y="${H-8}" text-anchor="middle" font-size="7" fill="var(--dm)">${lbl}</text>`;}).join("");

  // Dots and values
  let dots=arr.map((b,i)=>{let x=pad+i*step,tot=b.w+b.n+b.o,y=H-25-tot/mx*chartH;
    return`<circle cx="${x}" cy="${y}" r="3" fill="#fff" stroke="var(--am)" stroke-width="1.5"/><text x="${x}" y="${y-7}" text-anchor="middle" font-size="8" font-weight="700" font-family="var(--mn)" fill="var(--tx)">${tot}</text>`;}).join("");

  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    <defs>
      <linearGradient id="aW" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c0392b" stop-opacity="0.7"/><stop offset="100%" stop-color="#c0392b" stop-opacity="0.1"/></linearGradient>
      <linearGradient id="aN" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#27ae60" stop-opacity="0.7"/><stop offset="100%" stop-color="#27ae60" stop-opacity="0.1"/></linearGradient>
      <linearGradient id="aO" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2c6fbb" stop-opacity="0.7"/><stop offset="100%" stop-color="#2c6fbb" stop-opacity="0.1"/></linearGradient>
    </defs>
    ${gridLines}
    <path d="${toArea(ptsAll,ptsWN)}" fill="url(#aO)"/>
    <path d="${toArea(ptsWN,ptsW)}" fill="url(#aN)"/>
    <path d="${toArea(ptsW,baseline)}" fill="url(#aW)"/>
    <path d="${toPath(ptsAll)}" fill="none" stroke="#2c6fbb" stroke-width="1.5" opacity="0.6"/>
    <path d="${toPath(ptsWN)}" fill="none" stroke="#27ae60" stroke-width="1.5" opacity="0.6"/>
    <path d="${toPath(ptsW)}" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    ${dots}${labels}
  </svg>
  <div class="lg"><span><span class="ld" style="background:#c0392b"></span>Garantía</span><span><span class="ld" style="background:#27ae60"></span>NW</span><span><span class="ld" style="background:#2c6fbb"></span>Otros</span></div>`;
}

// Radial gauge charts for categories
function buildGauges(w,nw,pc,pf,cm,total){
  let cats=[
    {l:"Warranty",v:w,c:"#c0392b"},
    {l:"Non-W",v:nw,c:"#27ae60"},
    {l:"Partial",v:pc,c:"#2c6fbb"},
    {l:"PF",v:pf,c:"#c67a2e"},
    {l:"Chem",v:cm,c:"#7c3aed"}
  ];
  let gaugeHTML=cats.map(cat=>{
    let pct=total>0?(cat.v/total*100):0;
    let r=22,circ=2*Math.PI*r,dash=pct/100*circ;
    return`<div style="text-align:center;flex:1;min-width:55px">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="${r}" fill="none" stroke="#e8e2d9" stroke-width="5"/>
        <circle cx="28" cy="28" r="${r}" fill="none" stroke="${cat.c}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="0" transform="rotate(-90 28 28)" stroke-linecap="round">
          <animate attributeName="stroke-dasharray" from="0 ${circ}" to="${dash} ${circ}" dur="0.8s" fill="freeze"/>
        </circle>
        <text x="28" y="30" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" font-family="var(--mn)" fill="${cat.c}">${cat.v}</text>
      </svg>
      <div style="font-size:7px;color:var(--mu);margin-top:1px">${cat.l}</div>
      <div style="font-size:8px;font-weight:700;color:${cat.c}">${pct.toFixed(0)}%</div>
    </div>`;
  }).join("");
  return`<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">${gaugeHTML}</div>`;
}

    items=Object.entries(wTagCnt).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([t,c])=>({l:t,v:c,tag:t}));

function initPL(){
  let sel=$("plSup");if(!sel)return;
  let sups=[...new Set(PRICE_LIST.map(r=>r.supplier))].sort();
  sel.innerHTML='<option value="">Todos los proveedores</option>'+sups.map(s=>`<option>${s}</option>`).join("");

function renPL(){
  // Read values BEFORE rebuilding anything
  const qEl=$("plQ"), supEl=$("plSup"), sortEl=$("plSort");
  const q=(qEl?qEl.value:"").toLowerCase();
  const sup=supEl?supEl.value:"";
  const sort=sortEl?sortEl.value:"item";
  plFiltered=PRICE_LIST.filter(r=>{
    if(sup&&r.supplier!==sup)return false;
    if(q&&!r.item.toLowerCase().includes(q)&&!r.desc.toLowerCase().includes(q))return false;
    return true;
  });
  plFiltered.sort((a,b)=>{
    if(sort==="retail-asc")return(a.retail||0)-(b.retail||0);
    if(sort==="retail-desc")return(b.retail||0)-(a.retail||0);
    if(sort==="rda-asc")return(a.rda||0)-(b.rda||0);
    if(sort==="rda-desc")return(b.rda||0)-(a.rda||0);
    return a.item.localeCompare(b.item);
  });
  plPage=1;plExpanded.clear();
  // If panel already built, only update table body + count (preserves input focus)
  const tbody=$("pl-tbody");
  if(tbody){
    const countEl=$("pl-count");if(countEl)countEl.textContent=plFiltered.length+" partes";
    plRenderRows();
  } else {
    renPLTable();
  }
}

        <button class="bc" id="pl-next" onclick="plPage++;plRenderRows()">Sig →</button>
      </div>
    </div>`;
  // Populate supplier dropdown
  const sel=$("plSup");
  [...new Set(PRICE_LIST.map(r=>r.supplier))].sort().forEach(s=>{
    const o=document.createElement("option");o.value=o.textContent=s;sel.appendChild(o);
  });

}

function plRenderRows(){
  const fmt$=v=>v!=null?fm(v):"-";
  const start=(plPage-1)*PL_PER;
  const rows=plFiltered.slice(start,start+PL_PER);
  const tp=Math.ceil(plFiltered.length/PL_PER)||1;
  const tbodyEl=$("pl-tbody"); if(!tbodyEl)return;
  tbodyEl.innerHTML=rows.map((r,i)=>{
    const idx=start+i;
    const exp=plExpanded.has(idx);
    return`<tr onclick="plToggle(${idx})" style="cursor:pointer;${exp?"background:var(--c2)":""}">
      <td style="font-size:9px;color:var(--dm);white-space:nowrap">${r.supplier}</td>
      <td style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.item}</td>
      <td style="font-size:10px;color:var(--mu);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.desc||"—"}</td>
      <td style="text-align:right;font-weight:600;font-family:var(--mn)">${fmt$(r.retail)}</td>
      <td style="text-align:right;color:var(--gn);font-family:var(--mn)">${fmt$(r.rda)}</td>
      <td style="text-align:right;color:var(--rd);font-family:var(--mn)">${fmt$(r.warranty)}</td>
      <td style="text-align:right;color:var(--mu);font-family:var(--mn)">${fmt$(r.dealer)}</td>
    </tr>${exp?`<tr class="pl-exp"><td colspan="7">
      <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1;min-width:200px"><div style="font-size:13px;font-weight:700;margin-bottom:3px">${r.item}</div><div style="font-size:11px;color:var(--mu);line-height:1.5">${r.desc||"—"}</div></div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">${[["Retail",r.retail,"var(--tx)"],["RDA",r.rda,"var(--gn)"],["Garantía",r.warranty,"var(--rd)"],["Dealer",r.dealer,"var(--mu)"]].map(([l,v,c])=>`<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-family:var(--mn);color:${c}">${fmt$(v)}</div><div style="font-size:9px;color:var(--dm);margin-top:2px">${l}</div></div>`).join("")}</div>
      </div></td></tr>`:""}`;
  }).join("")||'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--dm)">Sin resultados</td></tr>';
  const prevEl=$("pl-prev"),nextEl=$("pl-next"),pgEl=$("pl-pg");
  if(prevEl)prevEl.disabled=plPage<=1;
  if(nextEl)nextEl.disabled=plPage>=tp;
  if(pgEl)pgEl.textContent=`Pág ${plPage} de ${tp}`;
}

function plToggle(idx){plExpanded.has(idx)?plExpanded.delete(idx):plExpanded.add(idx);plRenderRows();}

function renWC(){
  $("vWC").innerHTML=`

      <div><label style="font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;font-weight:600;display:block;margin-bottom:3px">Modelo (escribir SWIM si es swim spa)</label>
        <input type="text" id="wcMod" placeholder="ej. GS750 o SWIM15" oninput="calcWC()" style="width:100%"></div>
      <div><label style="font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;font-weight:600;display:block;margin-bottom:3px">Año de la tina</label>
        <input type="number" id="wcYr" placeholder="ej. 2020" min="1990" max="2099" oninput="calcWC()" style="width:100%"></div>
      <div><label style="font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;font-weight:600;display:block;margin-bottom:3px">Fecha de entrega <span style="font-size:8px;color:var(--dm)">(opcional — más preciso)</span></label>
        <input type="date" id="wcDel" oninput="let d=this.value;if(d){let y=new Date(d+'T12:00:00').getFullYear();let el=$('wcYr');if(el)el.value=y;}calcWC();" style="width:100%"></div>
      <div><label style="font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;font-weight:600;display:block;margin-bottom:3px">Fecha de servicio <span style="font-size:8px;color:var(--dm)">(default: hoy)</span></label>
        <input type="date" id="wcSvc" oninput="calcWC()" style="width:100%"></div>
    </div>

  </div>
  <div class="cd"><div class="cd-t">Referencia rápida de cobertura</div>
    <table class="wc-ref" style="width:100%;border-collapse:collapse">
      <thead><tr><th>Serie</th><th>Año 1</th><th>Años 2–3</th><th>Años 4–5</th><th>Año 6+</th></tr></thead>

        <tr><td><b>GS</b></td><td><span class="yr-free">Gratis</span></td><td><span class="yr-part">Trip charge · Partes gratis</span></td><td><span class="yr-part">Trip charge · 50% partes</span></td><td><span class="yr-out">Fuera garantía</span></td></tr>

function calcWC(){
  const series=($("wcSer")||{}).value||"";
  const model=(($("wcMod")||{}).value||"").toUpperCase();
  const yr=parseInt(($("wcYr")||{}).value)||0;
  const delRaw=($("wcDel")||{}).value||"";
  const svcRaw=($("wcSvc")||{}).value||"";
  const el=$("wcRes");if(!el)return;
  if(!yr&&!delRaw){el.innerHTML="";return;}
  if(!series&&!model){el.innerHTML="";return;}
  const swim=model.includes("SWIM")||series==="SWIM";
  const svcDate=svcRaw?new Date(svcRaw+"T12:00:00"):new Date();
  const useExact=!!delRaw;
  const startDate=useExact?new Date(delRaw+"T12:00:00"):new Date((yr||svcDate.getFullYear())+"-01-01T12:00:00");
  const msY=365.25*24*3600*1000;
  const ageMs=svcDate-startDate,ageYrs=ageMs/msY;
  const ageDays=Math.floor(ageMs/(24*3600*1000));
  const ageLbl=useExact?`${ageDays} días (${ageYrs.toFixed(2)} años) desde entrega`:`~${Math.floor(ageYrs)} años (estimado por año)`;
  const expLbl=yrs=>{
    if(!useExact)return`año ${yrs} desde compra`;
    const exp=new Date(startDate.getTime()+yrs*msY);
    return exp.toLocaleDateString("es-US",{year:"numeric",month:"long",day:"numeric"});
  };
  const dLeft=yrs=>Math.ceil((startDate.getTime()+yrs*msY-svcDate.getTime())/(24*3600*1000));
  let html="",cls="part";
  if(swim){
    if(ageYrs<=3){cls="ok";html=`<div class="wc-tier" style="color:var(--gn)">✓ En Garantía — Swim Spa</div><div class="wc-detail">${ageLbl}<br>Vence: <b>${expLbl(3)}</b>${useExact?` · ${dLeft(3)} días restantes`:""}<br><b>Cobrar: $0 — Partes y Labor cubiertos.</b></div>`;}
    else{cls="exp";html=`<div class="wc-tier" style="color:var(--rd)">✗ Fuera de Garantía — Swim Spa</div><div class="wc-detail">${ageLbl}<br>Venció: <b>${expLbl(3)}</b><br><b>Cobrar: Partes + Labor completo.</b></div>`;}
  }else if(series.startsWith("ES")){
    if(ageYrs<=5){cls="ok";html=`<div class="wc-tier" style="color:var(--gn)">✓ En Garantía — ES</div><div class="wc-detail">${ageLbl}<br>Vence: <b>${expLbl(5)}</b>${useExact?` · ${dLeft(5)} días`:""}<br><b>Cobrar: $0 — Partes y Labor cubiertos.</b></div>`;}
    else{cls="exp";html=`<div class="wc-tier" style="color:var(--rd)">✗ Fuera de Garantía — ES</div><div class="wc-detail">${ageLbl}<br>Venció: <b>${expLbl(5)}</b><br><b>Cobrar: Partes + Labor completo.</b></div>`;}
  }else if(series.startsWith("GS")){
    if(ageYrs<=1){cls="ok";html=`<div class="wc-tier" style="color:var(--gn)">✓ En Garantía — GS Año 1</div><div class="wc-detail">${ageLbl}<br>Cobertura completa hasta: <b>${expLbl(1)}</b>${useExact?` · ${dLeft(1)} días`:""}<br>Labor: Gratis · Partes: Gratis<br><b>Cobrar: $0</b></div>`;}
    else if(ageYrs<=3){cls="part";html=`<div class="wc-tier" style="color:var(--am)">⚠ GS — Parcial (Años 2–3)</div><div class="wc-detail">${ageLbl}<br>Partes hasta: <b>${expLbl(3)}</b>${useExact?` · ${dLeft(3)} días`:""}<br>Labor: <b>Solo trip charge</b> · Partes: Gratis<br><b>Cobrar: Trip fee</b></div>`;}
    else if(ageYrs<=5){cls="part";html=`<div class="wc-tier" style="color:var(--am)">⚠ GS — Parcial (Años 4–5)</div><div class="wc-detail">${ageLbl}<br>Cobertura parcial hasta: <b>${expLbl(5)}</b>${useExact?` · ${dLeft(5)} días`:""}<br>Labor: <b>Trip charge</b> · Partes: <b>50% MSRP</b><br><b>Cobrar: Trip fee + 50% partes</b></div>`;}
    else{cls="exp";html=`<div class="wc-tier" style="color:var(--rd)">✗ Fuera de Garantía — GS</div><div class="wc-detail">${ageLbl}<br>Venció: <b>${expLbl(5)}</b><br><b>Cobrar: Partes + Labor completo.</b></div>`;}
  }else if(series.startsWith("VS")){
    if(ageYrs<=1){cls="ok";html=`<div class="wc-tier" style="color:var(--gn)">✓ En Garantía — VS Año 1</div><div class="wc-detail">${ageLbl}<br>Cobertura hasta: <b>${expLbl(1)}</b>${useExact?` · ${dLeft(1)} días`:""}<br>Labor: Gratis · Partes: Gratis<br><b>Cobrar: $0</b></div>`;}
    else if(ageYrs<=3){cls="part";html=`<div class="wc-tier" style="color:var(--am)">⚠ VS — Solo Partes (Años 2–3)</div><div class="wc-detail">${ageLbl}<br>Partes hasta: <b>${expLbl(3)}</b>${useExact?` · ${dLeft(3)} días`:""}<br>Labor: <b>NO cubierta</b> · Partes: Gratis<br><b>Cobrar: Labor</b></div>`;}
    else{cls="exp";html=`<div class="wc-tier" style="color:var(--rd)">✗ Fuera de Garantía — VS</div><div class="wc-detail">${ageLbl}<br>Venció: <b>${expLbl(3)}</b><br><b>Cobrar: Partes + Labor completo.</b></div>`;}
  }else{html=`<div class="wc-tier">Selecciona una serie para verificar garantía.</div>`;cls="part";}
  el.innerHTML=`<div class="wc-res ${cls}">${html}</div>`;
}

  if(!name){if(msg)msg.innerHTML='<span style="color:var(--rd)">Ingresa un nombre.</span>';return;}
  if(TS.includes(name)){if(msg)msg.innerHTML='<span style="color:var(--rd)">Ya existe.</span>';return;}
  TS.push(name);TCC[name]={c:tx,bg};
  // update selects
  ["nt"].forEach(id=>{let sel=$(id);if(sel){const o=document.createElement("option");o.value=o.textContent=name;sel.appendChild(o);}});
  if(msg)msg.innerHTML='<span style="color:var(--gn)">✓ Técnico agregado</span>';
  setTimeout(()=>{if(msg)msg.innerHTML="";},2500);
  if($("mtName"))$("mtName").value="";
  renMTList();
}

function delTechMT(name){
  const cnt=D.filter(r=>r.t===name).length;
  const warn=cnt>0?` Este técnico tiene ${cnt} factura(s) — no se eliminarán, solo se quita del roster.`:"";
  if(!confirm(`¿Eliminar "${name}" del roster?${warn}`))return;
  const idx=TS.indexOf(name);if(idx>=0)TS.splice(idx,1);
  delete TCC[name];
  document.querySelectorAll("#nt option").forEach(o=>{if(o.value===name)o.remove();});
  renMTList();
  ren();
}

function expCSV(){
  const cols=["i","d","c","y","m","cat","st","h","l","a","b","n","t"];
  const hdrs=["Invoice#","Fecha","Cliente","Año","Modelo","Categoría","Servicio","Horas","Labor","Invoice $","Billed $","Notas","Técnico"];
  const esc=v=>{const s=String(v??"",-1);return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s;};
  const rows=[hdrs.map(esc).join(","),...D.map(r=>cols.map(c=>esc(r[c])).join(","))];
  const blob=new Blob([rows.join("\r\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="aspen-facturas-"+new Date().toISOString().slice(0,10)+".csv";
  a.click();URL.revokeObjectURL(a.href);
}

function tkRenderProds(list){
  if(!list||!list.length)return`<div style="text-align:center;color:#ccc;font-size:11px;padding:16px">${t("noMatch")}</div>`;
  return list.map(p=>{
    const price=tkGetPrice(p);
    const priceLabel=tkPriceType==="rda"?"RDA":tkPriceType==="retail"?"Retail":tkPriceType==="warranty"?"Warr.":"Dealer";
    return`<div class="tk-prod-item" onclick='tkAddProd(${JSON.stringify({supplier:p.supplier,item:p.item,desc:p.desc,retail:p.retail,rda:p.rda,warranty:p.warranty,dealer:p.dealer}).replace(/'/g,"&#39;")})'>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${tkEsc(p.item)}">${tkEsc(p.item)}</div>
        <div style="font-size:9px;color:#bbb;margin-top:1px">${tkEsc(p.supplier||"")}${p.desc?` · <em>${tkEsc(p.desc.slice(0,40))}${p.desc.length>40?"…":""}</em>`:""}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:6px">
        <div style="font-size:12px;font-weight:700;color:var(--am)">${price>0?tkFm(price):"—"}</div>
        <div style="font-size:8px;color:#bbb">${priceLabel}</div>
      </div>
      <button class="tk-add-btn" title="Add">+</button>
    </div>`;
  }).join("");
}

function tkFilterProds(){
  const q=($("tkSearch")||{}).value?.toLowerCase()||"";

  const el=$("tkProdList");if(el)el.innerHTML=tkRenderProds(list);
}

  tkLines.push({id:tkLid++,name:p.item,code:p.item,supplier:p.supplier||"",qty:1,price,aiNew:false});
  tkRenderLines();tkRecalc();tkToast(t("toastAdded")+" "+p.item);
}

function tkAddCustom(aiNew=false){
  const desc=($("tkCustomDesc")||{}).value?.trim()||"";
  tkLines.push({id:tkLid++,name:desc||"Custom Item",code:"",supplier:"",qty:1,price:0,aiNew});
  const el=$("tkCustomDesc");if(el)el.value="";
  tkRenderLines();tkRecalc();
}

function tkAddAILine(name,code,qty,price){
  tkLines.push({id:tkLid++,name,code,supplier:"",qty,price,aiNew:true});
}

function tkRemoveLine(id){tkLines=tkLines.filter(l=>l.id!==id);tkRenderLines();tkRecalc();}

function tkUpdateLine(id,field,val){
  const l=tkLines.find(l=>l.id===id);if(!l)return;
  if(field==="qty")l.qty=parseFloat(val)||0;
  if(field==="price")l.price=parseFloat(val)||0;
  if(field==="name")l.name=val;
  const el=$("tksub_"+id);if(el)el.textContent=tkFm(l.qty*l.price);
  tkRecalc();
}

function tkRenderLines(){
  const tbody=$("tkLineBody");if(!tbody)return;
  if(!tkLines.length){
    tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:#ccc;padding:22px;font-size:12px">${t("emptyLines")}</td></tr>`;
    return;
  }
  tbody.innerHTML=tkLines.map(l=>{
    const hasCode=l.code&&l.code.trim();
    return`<tr class="lrow2${l.aiNew?" tk-new-ai":""}">
    <td style="min-width:180px">
      <input class="ldesc2" value="${tkEsc(l.name)}" onchange="tkUpdateLine(${l.id},'name',this.value)">
      ${hasCode?`<div style="margin-top:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <span style="font-size:8px;font-weight:800;letter-spacing:.08em;background:var(--am);color:#fff;padding:1px 5px;border-radius:3px">QB</span>
        <span style="font-size:11px;font-weight:700;color:var(--am);font-family:var(--mn);white-space:nowrap">${tkEsc(l.code)}</span>
      </div>`:""}
    </td>
    <td style="vertical-align:top;padding-top:8px;min-width:120px">
      ${hasCode?`<div style="background:#fff8ee;color:var(--am);font-size:10px;font-weight:700;padding:4px 8px;border-radius:7px;border:1.5px solid #e8c97a;font-family:var(--mn);word-break:break-word;line-height:1.3">${tkEsc(l.code)}</div>`:""}
    </td>
    <td><input class="lqty2" type="number" value="${l.qty}" min="0" step="0.5" oninput="tkUpdateLine(${l.id},'qty',this.value)"></td>
    <td><input class="lprice2" type="number" value="${l.price.toFixed(2)}" min="0" step=".01" oninput="tkUpdateLine(${l.id},'price',this.value)"></td>
    <td class="lsub2" id="tksub_${l.id}">${tkFm(l.qty*l.price)}</td>
    <td><button class="ldel2" onclick="tkRemoveLine(${l.id})" title="Remove">✕</button></td>
  </tr>`;
  }).join("");
}

function tkRecalc(){
  const sub=tkLines.reduce((s,l)=>s+l.qty*l.price,0);
  const tax=sub*((parseFloat(($("tkTax")||{}).value||0)/100));
  const disc=parseFloat(($("tkDisc")||{}).value||0);
  const grand=Math.max(0,sub+tax-disc);
  const s=$("tkSubDisp"),tx=$("tkTaxDisp"),d=$("tkDiscDisp"),g=$("tkGrandDisp");
  if(s)s.textContent=tkFm(sub);if(tx)tx.textContent=tkFm(tax);if(d)d.textContent=tkFm(disc);if(g)g.textContent=tkFm(grand);
}

// ─── AI INVOICE GENERATION ─────────────────────────────────────────────────
async function runTKAI(){
  const story=($("tkStory")||{}).value?.trim()||"";
  if(!story){tkToast(t("writeFirst"));return;}

  // Get API key
  const apiKey=($("tkApiKey")||{}).value?.trim()||"";
  if(!apiKey){
    const stat=$("tkStat");
    if(stat)stat.innerHTML=`❌ <span style="color:var(--rd)">${t("noApiKey")} <a href="https://console.anthropic.com/keys" target="_blank" style="color:var(--bl)">${t("noApiKeyLink")}</a></span>`;
    return;
  }

  const btn=$("tkAiBtn"),icon=$("tkAiIcon"),txt=$("tkAiTxt"),stat=$("tkStat");
  btn.disabled=true;
  if(icon)icon.outerHTML='<span class="ai-spin" id="tkAiIcon"></span>';
  if(txt)txt.textContent=t("aiAnalyzing");
  if(stat)stat.textContent=t("aiAnalyzing");

  // Build catalog from PRICE_LIST — send all with non-zero prices
  const catalog=PRICE_LIST.filter(p=>p.retail>0||p.rda>0).slice(0,400).map(p=>{
    const price=p.rda||p.retail||0;
    return`${p.item} | ${p.supplier} | $${price.toFixed(2)}`;
  }).join("\n");

  const sys=`You are an expert billing assistant for Aspen Spas, a hot tub service company in St. Louis, MO.
Your job: Read a technician field report (Spanish or English) and build a complete invoice with QuickBooks item codes.

PRODUCT CATALOG (QB Item Code | Supplier | Price):
${catalog}

=== RULES ===

1. QB CODES (critical): 
   - "code" field = EXACT QuickBooks item code copied from catalog above
   - "name" field = friendly description shown on invoice
   - Key mappings: heater gasket → code:"Gecko-gasket 2\\" Heater"; YE-6 spa pack → code:"gecko-pack in.ye-6 US"; circ pump → code:"gecko-pump circulation"; 2-speed pump → code:"gecko-pump 2hp/8 amp 2 speed"; diverter valve → code:"WW-diverter valve - Grey"; locking union 2" → code:"magic-union, 2\\" locking"

2. LABOR — Output as TWO separate lines (MANDATORY):
   Line 1 — First hour (TC Basic): qty=1, price=120, code="Service Labor", name="TC Basic - 1h | First Hour"
   Line 2 — Additional hours (ONLY if total hours > 1): qty=(total_hours - 1), price=80, code="Service Labor - Adicional", name="Hrs Adicionales - Xh | Additional Hrs - Xh"
   
   Examples:
   • 1h total  → only Line 1: qty=1, price=120
   • 1.5h total → Line 1: qty=1 price=120 + Line 2: qty=0.5 price=80
   • 2h total  → Line 1: qty=1 price=120 + Line 2: qty=1 price=80
   • 3h total  → Line 1: qty=1 price=120 + Line 2: qty=2 price=80
   • 4h total  → Line 1: qty=1 price=120 + Line 2: qty=3 price=80
   
   TC / overall check = 1h. Equipment swap = 1.5h. Plumbing = 2-3h. Full rebuild/PF = 4h.

3. Extract: customer name, spa model, technician name, service date if mentioned.

4. ALWAYS include 1 labor line + all parts found.

OUTPUT — compact JSON only, no markdown, no backticks:
{"customer":"","spaModel":"","techName":"","serviceDate":"","lines":[{"name":"invoice description","code":"EXACT QB code","qty":1,"price":200.00}]}

For ALL lines: qty=number of units (1 for labor always), price=unit price for parts OR total for labor.`;

  try{
    if(stat)stat.textContent=t("aiSending");
    const headers={
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    };
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers,
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys,messages:[{role:"user",content:story}]})
    });
    if(!res.ok){
      const errBody=await res.json().catch(()=>({}));
      const msg=errBody?.error?.message||"API error "+res.status;
      throw new Error(msg);
    }
    const data=await res.json();
    const raw=data.content?.[0]?.text||"";
    if(stat)stat.textContent=t("aiParsing");
    const clean=raw.replace(/```json|```/gi,"").trim();
    let parsed;
    try{parsed=JSON.parse(clean);}catch{throw new Error("Could not parse AI response. Try again.");}
    if(parsed.customer){const el=$("tkClient");if(el&&!el.value)el.value=parsed.customer;}
    if(parsed.spaModel){const el=$("tkModel");if(el&&!el.value)el.value=parsed.spaModel;}
    if(parsed.techName){const el=$("tkTech");if(el&&!el.value)el.value=parsed.techName;}
    const added=parsed.lines||[];
    added.forEach(l=>{
      let qty=parseFloat(l.qty)||1;
      let price=parseFloat(l.price)||0;
      const code=l.code||"";
      const name=l.name||"Unknown";
      const isLabor=code.toLowerCase().includes("labor")||name.toLowerCase().includes("labor")||name.toLowerCase().includes("mano de obra")||name.toLowerCase().includes("tc basic")||name.toLowerCase().includes("hrs adicional");
      const isAdditional=code.toLowerCase().includes("adicional")||name.toLowerCase().includes("adicional")||name.toLowerCase().includes("additional");

      if(isLabor && !isAdditional){
        // Check if AI already output correctly (TC Basic line) or needs splitting
        // If qty=1 and price~120 → already TC basic, keep as is
        // If qty>1 or price seems like total → split
        const totalHours = qty > 1 ? qty : (price > 120 ? (120 + (price-120)/80 + 1) : qty);
        const looksLikeTotal = qty === 1 && price > 120 && price % 40 === 0;
        const looksLikeMultiHour = qty > 1;
        
        if(looksLikeMultiHour){
          // AI sent qty=hours, price=rate — recalculate and split
          const hrs = qty;
          tkAddAILine("TC Basic - 1h | First Hour","Service Labor",1,120);
          if(hrs > 1) tkAddAILine(`Hrs Adicionales - ${hrs-1}h | Additional Hrs`,"Service Labor - Adicional",hrs-1,80);
          return;
        } else if(looksLikeTotal){
          // AI sent total in price field (qty=1, price=total) — split back
          const hrs = 1 + (price - 120) / 80;
          tkAddAILine("TC Basic - 1h | First Hour","Service Labor",1,120);
          if(hrs > 1) tkAddAILine(`Hrs Adicionales - ${hrs-1}h | Additional Hrs`,"Service Labor - Adicional",hrs-1,80);
          return;
        }
        // Otherwise keep as-is (AI already split it correctly)
      }
      tkAddAILine(name,code,qty,price);
    });
    tkRenderLines();tkRecalc();
    if(stat)stat.innerHTML=`✦ <strong>${added.length}</strong> ${t("toastGenerated")}`;
    tkToast(`✦ ${added.length} ${t("toastGenerated")}`);
  }catch(err){
    let msg=err.message||String(err);
    if(msg.includes("Failed to fetch"))msg="Error de red. Revisa tu conexión y que la API Key sea válida.";
    if(stat)stat.innerHTML=`❌ <span style="color:var(--rd)">${msg}</span>`;
    tkToast("❌ "+msg);
  }finally{
    btn.disabled=false;
    const ic=$("tkAiIcon");if(ic)ic.outerHTML='<span id="tkAiIcon">✦</span>';
    const tx=$("tkAiTxt");if(tx)tx.textContent=t("aiBtn");
  }
}

function tkClear(){
  if(!confirm(t("clearBtn")+"?"))return;
  tkLines=[];tkRenderLines();tkRecalc();
  ["tkClient","tkAddr","tkPhone","tkModel","tkWO","tkTech","tkInvNum","tkNotes","tkSalesRep"].forEach(id=>{const el=$(id);if(el)el.value="";});
  const ts=$("tkStory"),st=$("tkStat");if(ts)ts.value="";if(st)st.textContent="";
  tkToast(t("toastCleared"));
}

function tkSavePDF(){tkToast("Use Print → Save as PDF");setTimeout(()=>window.print(),300);}

function tkToast(msg){
  // Reuse existing toast pattern
  let t2=document.getElementById("tkToast2");
  if(!t2){t2=document.createElement("div");t2.id="tkToast2";t2.style.cssText="position:fixed;bottom:22px;right:22px;background:var(--tx);color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);transform:translateY(70px);opacity:0;transition:all .3s;z-index:999";document.body.appendChild(t2);}
  t2.textContent=msg;t2.style.transform="translateY(0)";t2.style.opacity="1";
  setTimeout(()=>{t2.style.transform="translateY(70px)";t2.style.opacity="0";},2600);
}
